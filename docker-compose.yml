services:
  tablero-anuncios:
    build: .
    container_name: tablero-anuncios
    restart: unless-stopped
    ports:
      - "127.0.0.1:3010:3010"
    volumes:
      - ./server/data:/app/server/data
      - ./server/uploads:/app/server/uploads
    environment:
      - NODE_ENV=production
      - PORT=3010
